services:
  api-lab:
    image: node:18-alpine
    container_name: api_crud_postman
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: sh -c 'apk add --no-cache python3 make g++ && npm install express better-sqlite3 cors && node server.js'
    ports:
      - '3005:3000'
    restart: always
